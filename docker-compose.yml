version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://taskuser:taskpass@db:5432/taskmanager
      SECRET_KEY: dev-secret-change-in-prod
    volumes:
      - ./app:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 800 -reload

volumes:
  postgres_data: